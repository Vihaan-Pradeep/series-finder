<!DOCTYPE html>
<html>
  <head>
    <title>Series Finder</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Georgia, serif;
      }

      body {
        background: #1a1a2e;
        color: #eee;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 60px 20px;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        color: #e0b97f;
      }

      p {
        color: #aaa;
        margin-bottom: 40px;
      }

      .search {
        display: flex;
        gap: 10px;
        margin-bottom: 40px;
      }

      input {
        padding: 12px 20px;
        border-radius: 8px;
        border: none;
        background: #2a2a4a;
        color: #eee;
        font-size: 1rem;
        width: 300px;
      }

      button {
        padding: 12px 24px;
        border-radius: 8px;
        border: none;
        background: #e0b97f;
        color: #1a1a2e;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
      }
      #results {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 600px;
  text-align: center;
  margin: 0 auto;
}

#results img {
  border-radius: 8px;
  width: 300px;
}
    </style>
  </head>
  <body>
    <h1>Series Finder</h1>
    <p>Find every book in a series in order</p>
    <div class="search">
      <input id="searchBox" placeholder="Enter series name...">
      <button id="searchBtn">Search</button>
    </div>
    <div id="results"></div>

    <script>
      let input = document.getElementById("searchBox")
      let button = document.getElementById("searchBtn")
      let resultsDiv = document.getElementById("results")

      async function getBooks(seriesName) {
        resultsDiv.innerHTML = ""
        let response = await fetch("https://openlibrary.org/search.json?q=" + seriesName + "&limit=100")
        let data = await response.json()
        let books = data.docs
        let author = books[0].author_name[0]
        let filtered = books.filter(books => books.series_position && !books.series_position[0].includes("-"))
        let sorted = filtered.sort((a,b) => a.series_position[0] - b.series_position[0])

        if (sorted.length > 3) {
          for (let book of sorted) {
	    if (book.author_name[0] == author) {
            let name = book.title
            if (book.subtitle) {
              name = name + ": " + book.subtitle
            }
            let cover = book.cover_i
              ? `<img src="https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg">`
              : ""
            resultsDiv.innerHTML += name + "<br>" + cover + "<br>" + "<br>"
	  }
          }
          resultsDiv.innerHTML += "All Results Found"
          return
        }

        let seen = []
        for (let book of books) {
          if (!seen.includes(book.title) && book.author_name[0] == author) {
            seen.push(book.title)
            let name = book.title
            if (book.subtitle) {
              name = name + ": " + book.subtitle
            }
            let cover = book.cover_i
              ? `<img src="https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg">`
              : ""
            resultsDiv.innerHTML += name + "<br>" + cover + "<br>" + "<br>"
          }
        }
        resultsDiv.innerHTML += "All Results Found"
      }

      button.addEventListener("click", function() {
        getBooks(input.value)
      })
    </script>
  </body>
</html>
